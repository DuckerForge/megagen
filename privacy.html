o asesoramiento financiero.", "pubAppsHeading": "Nuestras aplicaciones", "pubAppsLead": "Una creciente colección de aplicaciones nativas, publicadas en la Solana dApp Store.", "aboutHeading": "Acerca de", "openSite": "Abrir sitio", "contact": "Contacto", "rights": "Aplicaciones para la Solana Seeker dApp Store"}, "apps": {"megagen": "Cestas de Solana con un solo toque. Elige un importe y un nivel de riesgo, toca una vez y hazte con una cesta verificada de 3 tokens intercambiados a través de Jupiter.", "soccer": "3D Soccer Stars: un trepidante juego de fútbol en 3D para el Solana Seeker.", "starbonk": "3D STARBONK: un juego arcade en 3D en Solana Mobile.", "skrburner": "SKR Burner: una utilidad de tokens de Solana Mobile para el Seeker.", "seekercraft": "SeekerCraft: una experiencia nativa de crafteo para el Seeker.", "theone": "The One: una aplicación nativa para el Solana Seeker.", "comet": "Comet: una aplicación nativa de Solana Mobile.", "solflex": "SolFlex: una aplicación nativa para el Solana Seeker."}, "privacy": [{"h": "Resumen", "p": "MEGAGEN es una aplicación móvil sin custodia y sin cuentas para el Solana Seeker. No te pedimos tu nombre, dirección de correo electrónico, número de teléfono ni ninguna otra información personal, y no gestionamos cuentas de usuario. Esta política explica qué datos limitados utiliza la aplicación y por qué."}, {"h": "Sin datos personales, sin cuentas", "p": "No creas una cuenta ni te registras para usar MEGAGEN. No recopilamos, almacenamos ni tratamos información que permita identificarte personalmente. No hay perfil, no hay inicio de sesión y no hay lista de correo."}, {"h": "Tu monedero", "p": "MEGAGEN se conecta a tu monedero de Solana existente a través del Solana Mobile Wallet Adapter únicamente para solicitar tu aprobación de las transacciones. Tus claves privadas nunca salen de tu monedero y MEGAGEN nunca las ve, transmite ni almacena."}, {"h": "Datos on-chain y de mercado", "p": "Para componer cestas, filtrar tokens en busca de señales básicas de seguridad y mostrar precios, la aplicación lee datos on-chain y de mercado disponibles públicamente de servicios de terceros, incluidos Jupiter, RugCheck, Helius RPC y CoinGecko / GeckoTerminal. Tu dirección pública de monedero se envía a estos servicios únicamente cuando es necesario para crear, simular y difundir tus transacciones, igual que cualquier aplicación de Solana."}, {"h": "Datos almacenados en tu dispositivo", "p": "El historial de tus cestas, la configuración y las preferencias se almacenan localmente solo en tu dispositivo. Esta información no se sube a nuestros servidores y se elimina si desinstalas la aplicación o borras su almacenamiento."}, {"h": "Sin venta de datos, sin seguimiento publicitario", "p": "No vendemos, alquilamos ni compartimos tus datos. MEGAGEN no incluye redes publicitarias de terceros ni SDK de analítica o seguimiento que elaboren perfiles sobre ti."}, {"h": "Menores", "p": "MEGAGEN está destinada a personas adultas (mayores de 18 años). No está dirigida a menores y no recopilamos conscientemente información de ninguna persona menor de 18 años."}, {"h": "Cambios y contacto", "p": "Podemos actualizar esta política de vez en cuando; la fecha indicada arriba refleja la versión más reciente. Para cualquier consulta sobre privacidad, contáctanos en infernaytb@gmail.com."}], "terms": [{"h": "Aceptación de estos términos", "p": "Al descargar o usar MEGAGEN aceptas estos Términos de uso. Si no estás de acuerdo, no uses la aplicación."}, {"h": "Qué es MEGAGEN", "p": "MEGAGEN es una herramienta de autocustodia que te ayuda a componer e intercambiar cestas de tokens de Solana en una sola acción. Se conecta a tu propio monedero a través del Solana Mobile Wallet Adapter y enruta los intercambios a través del agregador Jupiter. MEGAGEN nunca asume la custodia de tus fondos."}, {"h": "No es asesoramiento financiero — alto riesgo", "p": "MEGAGEN es una herramienta experimental, no asesoramiento financiero, de inversión, legal ni fiscal. Los tokens, especialmente las cestas de mayor riesgo, son extremadamente volátiles. Puedes perder una parte o TODOS los fondos que gastes, a veces en cuestión de minutos. Gasta únicamente lo que puedas permitirte perder."}, {"h": "Selección automatizada, sin garantías", "p": "La selección de tokens es automatizada y se filtra en busca de señales básicas de seguridad (liquidez, distribución entre poseedores, indicadores de riesgo on-chain), pero ningún filtro es perfecto y un token puede aun así fallar, desplomarse o ser malicioso. No ofrecemos ninguna garantía sobre el rendimiento, la seguridad o la capacidad de venta de ningún token, y no nos hacemos responsables de las pérdidas derivadas de tus operaciones."}, {"h": "Comisiones", "p": "Se aplica una comisión de plataforma para financiar el desarrollo: 1 % en cada compra y 0,5 % en cada venta. Las tarifas vigentes se muestran en la aplicación."}, {"h": "Tus responsabilidades", "p": "Eres el único responsable de tus operaciones, de la seguridad de tu monedero y de tu dispositivo, y de cumplir con las leyes y normativas de tu jurisdicción, incluidas las posibles restricciones a la negociación de criptoactivos."}, {"h": "Servicios de terceros", "p": "MEGAGEN depende de servicios de terceros (incluidos Jupiter, RugCheck, Helius y CoinGecko / GeckoTerminal) que no controlamos. No somos responsables de su disponibilidad, exactitud ni actuaciones, y su uso puede estar sujeto a sus propios términos."}, {"h": "Sin garantía", "p": "MEGAGEN se proporciona \"tal cual\" y \"según disponibilidad\", sin garantías de ningún tipo, ya sean expresas o implícitas. No garantizamos que la aplicación funcione sin interrupciones, sin errores ni de forma segura."}, {"h": "Limitación de responsabilidad", "p": "En la máxima medida permitida por la ley, DuckerForge y sus desarrolladores no serán responsables de daños indirectos, incidentales, especiales o consecuentes, ni de ninguna pérdida de fondos, beneficios o tokens, derivada de tu uso de MEGAGEN."}, {"h": "Elegibilidad, cambios y contacto", "p": "Debes tener al menos 18 años para usar MEGAGEN. Podemos actualizar estos términos de vez en cuando; el uso continuado implica que aceptas los cambios. Consultas: infernaytb@gmail.com."}]}, "fr": {"ui": {"privacyTitle": "Politique de confidentialité", "termsTitle": "Conditions d'utilisation", "updated": "Dernière mise à jour : 23 juin 2026", "backHome": "MEGAGEN", "langLabel": "Langue", "pubKicker": "Développeur indépendant · Solana Seeker", "pubTagline": "Des applications pour le Solana Seeker.", "pubAbout1": "DuckerForge est un développeur indépendant qui publie des applications sur le Solana Mobile dApp Store pour l'appareil Seeker. Nous nous concentrons sur des expériences rapides, natives et auto-conservées.", "pubAbout2": "Nos applications sont non dépositaires : elles se connectent via le Solana Mobile Wallet Adapter et ne détiennent jamais les fonds des utilisateurs. Les cryptomonnaies sont volatiles et risquées — nos applications de trading sont des outils, pas des conseils financiers.", "pubAppsHeading": "Nos applications", "pubAppsLead": "Une gamme croissante d'applications natives, publiées sur le Solana dApp Store.", "aboutHeading": "À propos", "openSite": "Ouvrir le site", "contact": "Contact", "rights": "Des applications pour le Solana Seeker dApp Store"}, "apps": {"megagen": "Des paniers Solana en un seul geste. Choisissez un montant et un niveau de risque, appuyez une fois, et possédez un panier de 3 jetons vérifiés échangés via Jupiter.", "soccer": "3D Soccer Stars — un jeu de football 3D rapide pour le Solana Seeker.", "starbonk": "3D STARBONK — un jeu d'arcade 3D sur Solana Mobile.", "skrburner": "SKR Burner — un utilitaire de jetons Solana Mobile pour le Seeker.", "seekercraft": "SeekerCraft — une expérience de craft native pour le Seeker.", "theone": "The One — une application native pour le Solana Seeker.", "comet": "Comet — une application native Solana Mobile.", "solflex": "SolFlex — une application native pour le Solana Seeker."}, "privacy": [{"h": "Aperçu", "p": "MEGAGEN est une application mobile non dépositaire et sans compte, conçue pour le Solana Seeker. Nous ne vous demandons ni votre nom, ni votre adresse e-mail, ni votre numéro de téléphone, ni aucune autre donnée personnelle, et nous ne gérons aucun compte utilisateur. Cette politique explique les données limitées utilisées par l'application et les raisons de cette utilisation."}, {"h": "Aucune donnée personnelle, aucun compte", "p": "Vous n'avez pas besoin de créer un compte ni de vous inscrire pour utiliser MEGAGEN. Nous ne collectons, ne stockons et ne traitons aucune information permettant de vous identifier personnellement. Il n'y a aucun profil, aucune connexion et aucune liste de diffusion."}, {"h": "Votre portefeuille", "p": "MEGAGEN se connecte à votre portefeuille Solana existant via le Solana Mobile Wallet Adapter dans le seul but de solliciter votre approbation des transactions. Vos clés privées ne quittent jamais votre portefeuille et ne sont jamais consultées, transmises ni stockées par MEGAGEN."}, {"h": "Données on-chain et de marché", "p": "Pour composer les paniers, filtrer les jetons selon des critères de sécurité de base et afficher les prix, l'application lit des données on-chain et de marché accessibles au public auprès de services tiers, notamment Jupiter, RugCheck, Helius RPC et CoinGecko / GeckoTerminal. Votre adresse de portefeuille publique n'est transmise à ces services que dans la mesure nécessaire pour construire, simuler et diffuser vos transactions — comme pour toute application Solana."}, {"h": "Données stockées sur votre appareil", "p": "L'historique de vos paniers, vos réglages et vos préférences sont stockés uniquement en local sur votre appareil. Ces informations ne nous sont pas transmises et sont supprimées si vous désinstallez l'application ou effacez ses données."}, {"h": "Aucune vente de données, aucun suivi publicitaire", "p": "Nous ne vendons, ne louons ni ne partageons vos données. MEGAGEN n'intègre aucun réseau publicitaire tiers ni aucun SDK d'analyse/de suivi destiné à vous profiler."}, {"h": "Mineurs", "p": "MEGAGEN est destiné aux adultes (18 ans et plus). L'application ne s'adresse pas aux mineurs, et nous ne collectons pas sciemment d'informations auprès de personnes de moins de 18 ans."}, {"h": "Modifications et contact", "p": "Nous sommes susceptibles de mettre à jour cette politique de temps à autre ; la date indiquée ci-dessus correspond à la version la plus récente. Pour toute question relative à la confidentialité, contactez-nous à l'adresse infernaytb@gmail.com."}], "terms": [{"h": "Acceptation des présentes conditions", "p": "En téléchargeant ou en utilisant MEGAGEN, vous acceptez les présentes Conditions d'utilisation. Si vous ne les acceptez pas, n'utilisez pas l'application."}, {"h": "Ce qu'est MEGAGEN", "p": "MEGAGEN est un outil auto-conservé qui vous aide à composer et à échanger des paniers de jetons Solana en une seule action. Il se connecte à votre propre portefeuille via le Solana Mobile Wallet Adapter et achemine les échanges via l'agrégateur Jupiter. MEGAGEN ne prend jamais possession de vos fonds."}, {"h": "Pas un conseil financier — risque élevé", "p": "MEGAGEN est un outil expérimental, et non un conseil financier, d'investissement, juridique ou fiscal. Les jetons — en particulier les paniers à plus haut risque — sont extrêmement volatils. Vous pouvez perdre une partie ou la TOTALITÉ des fonds que vous engagez, parfois en quelques minutes. N'engagez que ce que vous pouvez vous permettre de perdre."}, {"h": "Sélection automatisée, aucune garantie", "p": "La sélection des jetons est automatisée et filtrée selon des signaux de sécurité de base (liquidité, répartition des détenteurs, indicateurs de risque on-chain), mais aucun filtre n'est parfait et un jeton peut malgré tout échouer, s'effondrer ou se révéler malveillant. Nous ne donnons aucune garantie quant à la performance, la sécurité ou la revendabilité d'un jeton, et nous ne sommes pas responsables des pertes découlant de vos transactions."}, {"h": "Frais", "p": "Des frais de plateforme sont prélevés pour soutenir le développement : 1 % sur chaque achat et 0,5 % sur chaque vente. Les taux en vigueur sont indiqués dans l'application."}, {"h": "Vos responsabilités", "p": "Vous êtes seul responsable de vos transactions, de la sécurité de votre portefeuille et de votre appareil, ainsi que du respect des lois et réglementations de votre juridiction, y compris toute restriction relative au trading de crypto-actifs."}, {"h": "Services tiers", "p": "MEGAGEN s'appuie sur des services tiers (notamment Jupiter, RugCheck, Helius et CoinGecko / GeckoTerminal) que nous ne contrôlons pas. Nous ne sommes pas responsables de leur disponibilité, de leur exactitude ni de leurs actions, et leur utilisation peut être soumise à leurs propres conditions."}, {"h": "Absence de garantie", "p": "MEGAGEN est fourni « en l'état » et « selon disponibilité », sans garantie d'aucune sorte, qu'elle soit expresse ou implicite. Nous ne garantissons pas que l'application sera ininterrompue, exempte d'erreurs ou sécurisée."}, {"h": "Limitation de responsabilité", "p": "Dans toute la mesure permise par la loi, DuckerForge et ses développeurs ne sauraient être tenus responsables de tout dommage indirect, accessoire, spécial ou consécutif, ni d'aucune perte de fonds, de bénéfices ou de jetons, découlant de votre utilisation de MEGAGEN."}, {"h": "Éligibilité, modifications et contact", "p": "Vous devez être âgé d'au moins 18 ans pour utiliser MEGAGEN. Nous sommes susceptibles de mettre à jour ces conditions de temps à autre ; toute utilisation continue vaut acceptation des modifications. Questions : infernaytb@gmail.com."}]}, "ja": {"ui": {"privacyTitle": "プライバシーポリシー", "termsTitle": "利用規約", "updated": "最終更新日: 2026年6月23日", "backHome": "MEGAGEN", "langLabel": "言語", "pubKicker": "独立系開発者 · Solana Seeker", "pubTagline": "Solana Seeker のためのアプリ。", "pubAbout1": "DuckerForge は、Seeker デバイス向けに Solana Mobile dApp Store でアプリを提供する独立系の開発者です。私たちは、高速でネイティブ、かつ自己管理型（セルフカストディ）の体験に注力しています。", "pubAbout2": "私たちのアプリはノンカストディアル（非預託型）です。Solana Mobile Wallet Adapter を通じて接続し、ユーザーの資金を一切預かりません。暗号資産は変動が激しくリスクを伴います。私たちのトレーディングアプリはあくまでツールであり、金融上の助言ではありません。", "pubAppsHeading": "私たちのアプリ", "pubAppsLead": "Solana dApp Store で提供される、拡充を続けるネイティブアプリのラインナップ。", "aboutHeading": "概要", "openSite": "サイトを開く", "contact": "お問い合わせ", "rights": "Solana Seeker dApp Store のためのアプリ"}, "apps": {"megagen": "ワンタップの Solana バスケット。金額とリスクレベルを選んで一度タップするだけで、Jupiter を通じてスワップされた、審査済みの3トークンバスケットを保有できます。", "soccer": "3D Soccer Stars — Solana Seeker 向けのスピーディーな3Dサッカーゲーム。", "starbonk": "3D STARBONK — Solana Mobile 上のアーケード3Dゲーム。", "skrburner": "SKR Burner — Seeker 向けの Solana Mobile トークンユーティリティ。", "seekercraft": "SeekerCraft — Seeker 向けのネイティブなクラフト体験。", "theone": "The One — Solana Seeker 向けのネイティブアプリ。", "comet": "Comet — ネイティブな Solana Mobile アプリ。", "solflex": "SolFlex — Solana Seeker 向けのネイティブアプリ。"}, "privacy": [{"h": "概要", "p": "MEGAGEN は、Solana Seeker 向けの、ノンカストディアル（非預託型）かつアカウント不要のモバイルアプリです。私たちは、お客様の氏名、メールアドレス、電話番号、その他いかなる個人情報も求めず、ユーザーアカウントの運用も行いません。本ポリシーでは、本アプリが利用する限定的なデータの内容と、その理由について説明します。"}, {"h": "個人データなし、アカウントなし", "p": "MEGAGEN を利用するにあたり、アカウントの作成やサインアップは不要です。私たちは、お客様を識別できる個人情報を収集、保存、または処理しません。プロフィールもログインも、メーリングリストも存在しません。"}, {"h": "お客様のウォレット", "p": "MEGAGEN は、取引の承認をお客様に求める目的にのみ、Solana Mobile Wallet Adapter を通じて既存の Solana ウォレットに接続します。お客様の秘密鍵がウォレットの外に出ることは決してなく、MEGAGEN がそれを閲覧、送信、または保存することは一切ありません。"}, {"h": "オンチェーンデータおよび市場データ", "p": "バスケットの構成、基本的な安全性に関するトークンの審査、価格の表示のために、本アプリは Jupiter、RugCheck、Helius RPC、CoinGecko / GeckoTerminal などの第三者サービスから、一般に公開されているオンチェーンデータおよび市場データを取得します。お客様の公開ウォレットアドレスは、取引の構築、シミュレーション、ブロードキャストに必要な範囲でのみこれらのサービスに送信されます。これはあらゆる Solana アプリケーションと同様です。"}, {"h": "お客様の端末に保存されるデータ", "p": "お客様のバスケット履歴、設定、各種環境設定は、お客様の端末内にのみローカルに保存されます。これらの情報が私たちにアップロードされることはなく、アプリをアンインストールするか、そのストレージを消去すると削除されます。"}, {"h": "データの販売なし、広告トラッキングなし", "p": "私たちは、お客様のデータを販売、貸与、または共有しません。MEGAGEN には、お客様をプロファイリングするような第三者の広告ネットワークや、分析・トラッキングを行う SDK は含まれていません。"}, {"h": "未成年者について", "p": "MEGAGEN は成人（18歳以上）の利用を想定しています。本アプリは子どもを対象としておらず、私たちは18歳未満の方から故意に情報を収集することはありません。"}, {"h": "変更およびお問い合わせ", "p": "本ポリシーは随時更新されることがあります。上記の日付は最新版を反映しています。プライバシーに関するご質問は infernaytb@gmail.com までお問い合わせください。"}], "terms": [{"h": "本規約への同意", "p": "MEGAGEN をダウンロードまたは利用することにより、お客様は本利用規約に同意したものとみなされます。同意されない場合は、本アプリを利用しないでください。"}, {"h": "MEGAGEN とは", "p": "MEGAGEN は、Solana トークンのバスケットを一つの操作で構成・スワップできるよう支援する、自己管理型（セルフカストディ）のツールです。Solana Mobile Wallet Adapter を通じてお客様自身のウォレットに接続し、Jupiter アグリゲーターを介してスワップをルーティングします。MEGAGEN がお客様の資金を預かることは一切ありません。"}, {"h": "金融助言ではありません — 高リスク", "p": "MEGAGEN は実験的なツールであり、金融、投資、法務、または税務に関する助言ではありません。トークン、とりわけ高リスクのバスケットは極めて変動が激しいものです。お客様が支出した資金の一部、または全額を、場合によっては数分のうちに失う可能性があります。失っても許容できる範囲の金額のみを支出してください。"}, {"h": "自動選定、無保証", "p": "トークンの選定は自動化されており、基本的な安全性のシグナル（流動性、保有者の分散、オンチェーンのリスクフラグ）によってフィルタリングされていますが、いかなるフィルターも完璧ではなく、トークンが破綻、暴落、または悪意あるものとなる可能性は依然として残ります。私たちは、いかなるトークンのパフォーマンス、安全性、または売却可能性についても保証せず、お客様の取引に起因する損失について責任を負いません。"}, {"h": "手数料", "p": "開発を支えるために、プラットフォーム手数料を徴収します。購入ごとに1%、売却ごとに0.5%です。現行の料率はアプリ内に表示されます。"}, {"h": "お客様の責任", "p": "お客様は、ご自身の取引、ウォレットおよび端末のセキュリティ、ならびに暗号資産取引に対するあらゆる制限を含む、お客様の管轄区域の法令の遵守について、単独で責任を負います。"}, {"h": "第三者サービス", "p": "MEGAGEN は、私たちが管理していない第三者サービス（Jupiter、RugCheck、Helius、CoinGecko / GeckoTerminal を含む）に依存しています。私たちは、それらの可用性、正確性、または動作について責任を負わず、その利用はそれぞれのサービス独自の規約の対象となる場合があります。"}, {"h": "無保証", "p": "MEGAGEN は、明示または黙示を問わずいかなる種類の保証もなく、「現状有姿」かつ「提供可能な範囲」で提供されます。私たちは、本アプリが中断されないこと、エラーがないこと、または安全であることを保証しません。"}, {"h": "責任の制限", "p": "法律で認められる最大限の範囲において、DuckerForge およびその開発者は、お客様の MEGAGEN の利用に起因する、間接的、付随的、特別、または結果的な損害、ならびに資金、利益、またはトークンのいかなる損失についても、責任を負いません。"}, {"h": "利用資格、変更およびお問い合わせ", "p": "MEGAGEN を利用するには18歳以上である必要があります。私たちは本規約を随時更新することがあります。利用を継続することは、変更への同意を意味します。ご質問は infernaytb@gmail.com まで。"}]}, "ko": {"ui": {"privacyTitle": "개인정보 처리방침", "termsTitle": "이용약관", "updated": "최종 업데이트: 2026년 6월 23일", "back ": "데이터 판매 없음, 광고 추적 없음", "p": "저희는 귀하의 데이터를 판매, 대여 또는 공유하지 않습니다. MEGAGEN에는 귀하를 프로파일링하는 제3자 광고 네트워크나 분석/추적 SDK가 포함되어 있지 않습니다."}, {"h": "아동", "p": "MEGAGEN은 성인(만 18세 이상)을 대상으로 합니다. 아동을 대상으로 하지 않으며, 만 18세 미만의 사람으로부터 고의로 정보를 수집하지 않습니다."}, {"h": "변경 및 연락처", "p": "저희는 본 방침을 수시로 업데이트할 수 있으며, 위의 날짜는 최신 버전을 반영합니다. 개인정보 관련 문의는 infernaytb@gmail.com으로 연락해 주시기 바랍니다."}], "terms": [{"h": "본 약관의 동의", "p": "MEGAGEN을 다운로드하거나 사용함으로써 귀하는 본 이용약관에 동의하게 됩니다. 동의하지 않으시면 앱을 사용하지 마십시오."}, {"h": "MEGAGEN이란", "p": "MEGAGEN은 단일 동작으로 Solana 토큰 바스켓을 구성하고 스왑할 수 있도록 돕는 자기수탁형(self-custodial) 도구입니다. Solana Mobile Wallet Adapter를 통해 귀하 자신의 지갑에 연결하고, Jupiter 애그리게이터를 통해 스왑을 라우팅합니다. MEGAGEN은 귀하의 자금을 절대 수탁하지 않습니다."}, {"h": "금융 자문 아님 — 고위험", "p": "MEGAGEN은 실험적인 도구이며, 금융, 투자, 법률 또는 세무 자문이 아닙니다. 토큰 — 특히 고위험 바스켓 — 은 극도로 변동성이 큽니다. 귀하는 지출한 자금의 일부 또는 전부를, 때로는 몇 분 안에 잃을 수 있습니다. 잃어도 감당할 수 있는 금액만 지출하십시오."}, {"h": "자동 선정, 보증 없음", "p": "토큰 선정은 자동화되어 있으며 기본적인 안전 신호(유동성, 보유자 분산, 온체인 위험 플래그)에 따라 필터링되지만, 어떤 필터도 완벽하지 않으며 토큰은 여전히 실패하거나 폭락하거나 악의적일 수 있습니다. 저희는 어떠한 토큰의 성과, 안전성 또는 매도 가능성에 대해서도 보증하지 않으며, 귀하의 거래로 인해 발생하는 손실에 대해 책임지지 않습니다."}, {"h": "수수료", "p": "개발 지원을 위해 플랫폼 수수료가 부과됩니다: 매수 시 1%, 매도 시 0.5%. 현재 요율은 앱 내에 표시됩니다."}, {"h": "귀하의 책임", "p": "귀하는 귀하의 거래, 지갑 및 기기의 보안, 그리고 암호자산 거래에 대한 제한을 포함하여 귀하 관할권의 법률 및 규정 준수에 대해 전적으로 책임을 집니다."}, {"h": "제3자 서비스", "p": "MEGAGEN은 저희가 통제하지 않는 제3자 서비스(Jupiter, RugCheck, Helius, CoinGecko / GeckoTerminal 포함)에 의존합니다. 저희는 이들의 가용성, 정확성 또는 행위에 대해 책임지지 않으며, 이들의 이용은 각자의 약관이 적용될 수 있습니다."}, {"h": "보증의 부인", "p": "MEGAGEN은 명시적이든 묵시적이든 어떠한 종류의 보증도 없이 \"있는 그대로(as is)\" 및 \"이용 가능한 상태로(as available)\" 제공됩니다. 저희는 앱이 중단되지 않거나, 오류가 없거나, 안전할 것임을 보증하지 않습니다."}, {"h": "책임의 제한", "p": "법률이 허용하는 최대 범위 내에서, DuckerForge 및 그 개발자들은 귀하의 MEGAGEN 사용으로 인해 발생하는 어떠한 간접적, 부수적, 특별 또는 결과적 손해, 또는 자금, 이익 또는 토큰의 손실에 대해서도 책임지지 않습니다."}, {"h": "이용 자격, 변경 및 연락처", "p": "MEGAGEN을 사용하려면 만 18세 이상이어야 합니다. 저희는 본 약관을 수시로 업데이트할 수 있으며, 계속 사용하는 것은 변경 사항에 동의하는 것을 의미합니다. 문의: infernaytb@gmail.com."}]}, "zh": {"ui": {"privacyTitle": "隐私政策", "termsTit
